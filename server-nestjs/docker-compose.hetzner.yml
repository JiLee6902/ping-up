# Hetzner Cloud - CX23 x86: 2 vCPU + 4GB RAM + 40GB SSD (~$4.09/month)
# No Prometheus/Grafana/Jaeger — tight on RAM
# All traffic goes through nginx reverse proxy (ports 80/443 only)
#
# Resource budget (4GB total, ~800MB for OS):
#   postgres:       512MB   | 0.5 CPU
#   redis:          128MB   | 0.15 CPU
#   nginx:           32MB   | 0.1 CPU
#   app-api:        512MB   | 0.5 CPU
#   notification:   256MB   | 0.25 CPU
#   cronjob-worker: 256MB   | 0.25 CPU
#   ─────────────────────────────────
#   Total:        ~1.7GB    | 1.75 CPU
#   Remaining:    ~2.3GB for OS cache + buffer
#   Swap:          2GB (safety net)

services:
  postgres:
    image: postgres:15-alpine
    container_name: pingup-postgres
    restart: unless-stopped
    command: >
      postgres
      -c wal_level=logical
      -c max_replication_slots=4
      -c max_wal_senders=4
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c work_mem=4MB
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - pingup_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "2"
        compress: "true"

  redis:
    image: redis:7-alpine
    container_name: pingup-redis
    restart: unless-stopped
    env_file:
      - .env.production
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD}"
      --maxmemory 96mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - pingup_network
    deploy:
      resources:
        limits:
          cpus: '0.15'
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "2"
        compress: "true"

  nginx:
    image: nginx:alpine
    container_name: pingup-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./scripts/hetzner/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/pingup/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app-api
    networks:
      - pingup_network
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 32M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "2"
        compress: "true"

  app-api:
    image: ${REGISTRY}/pingup-app-api:${VERSION:-latest}
    container_name: pingup-app-api
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      OTEL_SERVICE_NAME: pingup-app-api
      TRACING_ENABLED: "false"
    volumes:
      - app_api_logs:/app/logs
    networks:
      - pingup_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "30m"
        max-file: "3"
        compress: "true"

  notification:
    image: ${REGISTRY}/pingup-notification:${VERSION:-latest}
    container_name: pingup-notification
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4001
      OTEL_SERVICE_NAME: pingup-notification
      TRACING_ENABLED: "false"
    volumes:
      - notification_logs:/app/logs
    networks:
      - pingup_network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "2"
        compress: "true"

  cronjob-worker:
    image: ${REGISTRY}/pingup-cronjob-worker:${VERSION:-latest}
    container_name: pingup-cronjob-worker
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4002
      NODE_OPTIONS: "--expose-gc --max-old-space-size=192"
      OTEL_SERVICE_NAME: pingup-cronjob-worker
      TRACING_ENABLED: "false"
    volumes:
      - cronjob_logs:/app/logs
    networks:
      - pingup_network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "2"
        compress: "true"

volumes:
  postgres_data:
  redis_data:
  app_api_logs:
  notification_logs:
  cronjob_logs:

networks:
  pingup_network:
    driver: bridge
