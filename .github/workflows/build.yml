name: Build Docker Images

on:
  push:
    branches:
      - main
    paths:
      - 'server-nestjs/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      app:
        description: 'App to build'
        required: true
        type: choice
        options:
          - app-api
          - notification
          - cronjob-worker
          - all
        default: all

env:
  REGISTRY: ${{ secrets.DOCKER_USERNAME }}

jobs:
  build-single:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.app != 'all' }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set port based on app
        id: set-port
        run: |
          case "${{ github.event.inputs.app }}" in
            app-api) echo "port=3000" >> $GITHUB_OUTPUT ;;
            notification) echo "port=3002" >> $GITHUB_OUTPUT ;;
            cronjob-worker) echo "port=3003" >> $GITHUB_OUTPUT ;;
          esac

      - name: Build and Push
        run: |
          docker build \
            --build-arg APP_NAME=${{ github.event.inputs.app }} \
            --build-arg APP_PORT=${{ steps.set-port.outputs.port }} \
            -t ${{ env.REGISTRY }}/pingup-${{ github.event.inputs.app }}:${{ github.sha }}-${{ matrix.arch }} \
            -f ./server-nestjs/Dockerfile \
            ./server-nestjs
          docker push ${{ env.REGISTRY }}/pingup-${{ github.event.inputs.app }}:${{ github.sha }}-${{ matrix.arch }}

  merge-single:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.app != 'all' }}
    needs: build-single
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create multi-arch manifest
        run: |
          APP="${{ github.event.inputs.app }}"
          SHA="${{ github.sha }}"
          IMG="${{ env.REGISTRY }}/pingup-${APP}"

          docker buildx imagetools create -t ${IMG}:${SHA} \
            ${IMG}:${SHA}-amd64 \
            ${IMG}:${SHA}-arm64

          docker buildx imagetools create -t ${IMG}:latest \
            ${IMG}:${SHA}-amd64 \
            ${IMG}:${SHA}-arm64

      - name: Summary
        run: |
          echo "### Build Successful! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "**App:** ${{ github.event.inputs.app }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  build-all:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.app == 'all') }}
    strategy:
      matrix:
        include:
          - app: app-api
            port: 3000
            runner: ubuntu-latest
            arch: amd64
          - app: app-api
            port: 3000
            runner: ubuntu-24.04-arm
            arch: arm64
          - app: notification
            port: 3002
            runner: ubuntu-latest
            arch: amd64
          - app: notification
            port: 3002
            runner: ubuntu-24.04-arm
            arch: arm64
          - app: cronjob-worker
            port: 3003
            runner: ubuntu-latest
            arch: amd64
          - app: cronjob-worker
            port: 3003
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push ${{ matrix.app }} (${{ matrix.arch }})
        run: |
          docker build \
            --build-arg APP_NAME=${{ matrix.app }} \
            --build-arg APP_PORT=${{ matrix.port }} \
            -t ${{ env.REGISTRY }}/pingup-${{ matrix.app }}:${{ github.sha }}-${{ matrix.arch }} \
            -f ./server-nestjs/Dockerfile \
            ./server-nestjs
          docker push ${{ env.REGISTRY }}/pingup-${{ matrix.app }}:${{ github.sha }}-${{ matrix.arch }}

  merge-all:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.app == 'all') }}
    needs: build-all
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [app-api, notification, cronjob-worker]
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create multi-arch manifest for ${{ matrix.app }}
        run: |
          IMG="${{ env.REGISTRY }}/pingup-${{ matrix.app }}"
          SHA="${{ github.sha }}"

          docker buildx imagetools create -t ${IMG}:${SHA} \
            ${IMG}:${SHA}-amd64 \
            ${IMG}:${SHA}-arm64

          docker buildx imagetools create -t ${IMG}:latest \
            ${IMG}:${SHA}-amd64 \
            ${IMG}:${SHA}-arm64

      - name: Summary
        run: |
          echo "### Build ${{ matrix.app }} Successful! :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.REGISTRY }}/pingup-${{ matrix.app }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
